<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Becca Foodies</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, Helvetica, sans-serif;

            background:linear-gradient(
                135deg,
                #00b894,
                #00cec9,
                #55efc4
            );

            overflow:hidden;
        }

        /* Floating circles */

        body::before,
        body::after{
            content:"";
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,.15);
            animation:float 10s infinite ease-in-out;
        }

        body::before{
            width:250px;
            height:250px;
            top:-60px;
            left:-60px;
        }

        body::after{
            width:320px;
            height:320px;
            bottom:-100px;
            right:-100px;
            animation-delay:3s;
        }

        @keyframes float{

            0%{
                transform:translateY(0);
            }

            50%{
                transform:translateY(30px);
            }

            100%{
                transform:translateY(0);
            }

        }

        .reset-card{

            width:100%;
            max-width:460px;

            background:rgba(255,255,255,.18);

            backdrop-filter:blur(18px);

            border-radius:25px;

            padding:40px;

            box-shadow:0 15px 40px rgba(0,0,0,.2);

            animation:fadeUp .8s ease;

            z-index:2;

        }

        @keyframes fadeUp{

            from{

                opacity:0;
                transform:translateY(40px);

            }

            to{

                opacity:1;
                transform:translateY(0);

            }

        }

        .logo{

            font-size:65px;
            color:white;
            text-align:center;

        }

        h2{

            color:white;
            font-weight:bold;
            text-align:center;
            margin-top:10px;

        }

        .subtitle{

            color:#f8f9fa;
            text-align:center;
            margin-bottom:25px;

        }

        .form-control{

            height:52px;
            border-radius:50px;
            padding-left:20px;

        }

        .password-wrapper{

            position:relative;

        }

        .toggle-password{

            position:absolute;
            right:18px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            color:#666;
            font-size:22px;

        }

        .btn-reset{

            background:#ffc107;
            border:none;
            color:#222;
            border-radius:50px;
            padding:12px;
            font-weight:bold;
            transition:.3s;

        }

        .btn-reset:hover{

            background:#ffb300;
            transform:translateY(-2px);

        }

        .back-login{

            text-align:center;
            margin-top:20px;

        }

        .back-login a{

            color:white;
            text-decoration:none;
            font-weight:bold;

        }

        .back-login a:hover{

            text-decoration:underline;

        }

        .alert{

            border-radius:15px;

        }

        @media(max-width:576px){

            .reset-card{

                margin:20px;
                padding:30px 25px;

            }

            h2{

                font-size:1.8rem;

            }

        }

    </style>

</head>
<body>

<div class="reset-card">

    <div class="logo">
        <i class='bx bxs-lock-open'></i>
    </div>

    <h2>Reset Password</h2>

    <p class="subtitle">
        Enter your new password below.
    </p>

    <!-- Flash Messages -->

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}

            {% for category,message in messages %}

            <div class="alert alert-{{ category }} alert-dismissible fade show">

                {{ message }}

                <button class="btn-close" data-bs-dismiss="alert"></button>

            </div>

            {% endfor %}

        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3 password-wrapper">

            <input
                type="password"
                class="form-control"
                name="password"
                id="password"
                placeholder="New Password"
                required>

            <i class='bx bx-hide toggle-password' onclick="togglePassword('password',this)"></i>

        </div>

        <div class="mb-4 password-wrapper">

            <input
                type="password"
                class="form-control"
                name="confirm_password"
                id="confirm_password"
                placeholder="Confirm Password"
                required>

            <i class='bx bx-hide toggle-password' onclick="togglePassword('confirm_password',this)"></i>

        </div>

        <button class="btn btn-reset w-100">

            <i class='bx bx-refresh'></i>

            Reset Password

        </button>

    </form>

    <div class="back-login">

        <a href="{{ url_for('login') }}">

            <i class='bx bx-arrow-back'></i>

            Back to Login

        </a>

    </div>

</div>

<script>

function togglePassword(id,icon){

    const input=document.getElementById(id);

    if(input.type==="password"){

        input.type="text";

        icon.classList.remove("bx-hide");

        icon.classList.add("bx-show");

    }else{

        input.type="password";

        icon.classList.remove("bx-show");

        icon.classList.add("bx-hide");

    }

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
